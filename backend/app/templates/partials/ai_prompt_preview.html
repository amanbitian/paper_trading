{% if preview %}
<ul class="ai-prompt-preview-list">
    {% for item in preview.context_items %}
    <li><span>{{ item.label }}</span><strong>{{ item.value }}</strong></li>
    {% endfor %}
</ul>
<p class="muted">{{ preview.disclaimer }}</p>
{% else %}
<p class="muted">Select mode, stock, and portfolio to preview context.</p>
{% endif %}
