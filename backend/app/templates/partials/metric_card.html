<article class="metric-card{% if card_class %} {{ card_class }}{% endif %}">
    <span class="metric-label">{{ label }}</span>
    <strong class="metric-value{% if value_class %} {{ value_class }}{% endif %}">{{ value }}</strong>
    {% if delta %}
        <span class="metric-delta {{ tone or 'neutral' }}">{{ delta }}</span>
    {% endif %}
</article>
